about:
  title: Lo studio
  intro: >-
    Atelier-Kit è una vetrina configurabile per lavori artigianali, opere e
    progetti creativi.

    Sostituisci questo testo con la storia del tuo studio, il processo creativo
    e il background.
  sections:
    - heading: Come funziona questa vetrina
      body: >-
        Entità, collezioni e contatti si modificano tramite file YAML o lo
        Studio locale.

        I Signal Clouds aiutano i visitatori a descrivere cosa cercano prima di
        inviare un Visitor Brief.
