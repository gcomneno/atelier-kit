id: apertura-stagione-2026
title: Apertura stagione 2026
date: 2026-03-15
sort_order: 20
excerpt: Da sabato 15 marzo torniamo con percorsi guidati, picnic area e il
  recinto delle capre più chiacchierone del parco.
body: >
  Lo Zoo delle Colline di Pistoia riapre ufficialmente sabato 15 marzo.


  Per tutto il weekend inaugurale ingresso ridotto per famiglie e laboratorio
  gratuito sulle impronte degli animali locali, dalle 10:30 alle 12:30.


  Ricordiamo che i sentieri del bosco restano accessibili solo con calzature
  comode e che gli animali da fattoria preferiscono visitatori tranquilli (e
  carote tagliate a listarelle, non cubetti).
