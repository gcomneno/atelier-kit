name: Documentation
description: Report unclear, missing or incorrect documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Which doc or page?
      description: File path, README section, or URL.
      placeholder: docs/usage/studio.md — Publish section
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Be specific so we can fix it quickly.
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who is affected?
      options:
        - Developer / operator
        - Non-technical client
        - Contributor
        - Not sure
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional — how should the doc read instead?
    validations:
      required: false
