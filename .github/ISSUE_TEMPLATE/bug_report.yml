name: Bug report
description: Something is broken or behaves incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill every field below.
        Support requests and off-topic reports may be closed without reply.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: I ran `npm run build` and…
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. npm install
        2. npm run dev
        3. Open /items/example
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Atelier-Kit version or commit
      description: Release tag, `package.json` version, or git commit SHA.
      placeholder: v0.1.19 or abc1234
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local dev (`npm run dev`)
        - Local studio (`npm run studio`)
        - Production / Vercel deploy
        - Client site fork
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste terminal output or browser console errors.
      render: shell
    validations:
      required: false
