id: orari-luglio-agosto
title: Orari estivi luglio e agosto
date: 2026-07-01
sort_order: 40
excerpt: Aperture anticipate, pausa di mezzogiorno per gli animali e serate
  speciali ogni venerdì.
body: >
  Da luglio lo zoo osserva orario estivo: ingresso dalle 9:00, chiusura alle
  19:30 (ultimo accesso alle 18:45).


  Tra le 13:00 e le 15:00 alcuni recinti restano in pausa per il benessere degli
  animali — il bar e l'area picnic rimangono aperti.


  Ogni venerdì sera, fino al 29 agosto, «Tramonti sul recinto»: visita guidata
  breve + musica dal vivo nell'anfiteatro. Biglietti separati, prenotabili in
  biglietteria o via email.
