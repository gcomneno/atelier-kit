id: nuovi-arrivi-lama
title: "Nuovi arrivi: Lima e Lola"
date: 2026-05-02
sort_order: 10
excerpt: Due lama giovani si sono uniti al gregge. Spoiler — già hanno
  un'opinione su tutto.
body: >
  Dopo mesi di preparazione degli recinti, Lima e Lola sono finalmente tra noi.


  Arrivano da un allevamento certificato in Toscana e stanno completando il
  periodo di ambientamento in una zona appartata, visibile dal percorso giallo.


  Il team educativo organizza brevi incontri informativi ogni domenica alle
  11:00. Niente selfie invasivi: questi due giudicano già abbastanza senza flash
  aggiuntivi.
