signal_clouds:
  - id: motivo-visita
    enabled: true
    question: Cosa ti porta al parco?
    hint: Una sola risposta — puoi cambiare idea in qualsiasi momento.
    options:
      - id: famiglia
        label: Giornata in famiglia
      - id: scuola
        label: Gita scolastica
      - id: appassionato
        label: Sono un appassionato di fauna
  - id: impressione
    enabled: true
    question: Che impressione ti fa questo animale?
    hint: Scegli l'opzione che ti rappresenta meglio adesso.
    options:
      - id: delicata
        label: Delicata e silenziosa
      - id: vivace
        label: Vivace e curiosa
      - id: maestosa
        label: Maestosa, da osservare con calma
